version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mft_user
      POSTGRES_PASSWORD: mft_secret
      POSTGRES_DB: mft_db
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data", "./init.sql:/docker-entrypoint-initdb.d/init.sql"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pg_data:
  minio_data: